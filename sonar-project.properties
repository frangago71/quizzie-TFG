sonar.projectKey=frangago71_quizzie-TFG
sonar.organization=frangago71

sonar.projectName=quizzie-TFG
sonar.projectVersion=1.0

sonar.sources=backend,frontend/src

sonar.exclusions=**/node_modules/**, **/dist/**, **/.venv/**, **/tests/**, **/*.spec.ts, backend/seed.py, **/__pycache__/**, **/*.log

sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml
# Exclusión temporal de cobertura para el frontend (se eliminará al implementar los tests frontend)
sonar.coverage.exclusions=frontend/src/**
sonar.javascript.environments=browser
sonar.sourceEncoding=UTF-8

sonar.scm.provider=git
sonar.scm.forceReloadAll=false
